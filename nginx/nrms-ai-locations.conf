# ─────────────────────────────────────────────────────────────────────────────
# NRMS AI Assistant — add INSIDE your existing server { } for nrms.ati.gov.et
# (e.g. /etc/nginx/sites-available/nrms.ati.gov.et)
#
# Prerequisite: docker compose up -d  (API on 127.0.0.1:8001)
# ─────────────────────────────────────────────────────────────────────────────

# Public chat UI → https://nrms.ati.gov.et/assistant
location = /assistant {
    proxy_pass http://127.0.0.1:8001/assistant;
    include /etc/nginx/snippets/nrms-ai-proxy.conf;
}

location = /assistant/ {
    return 301 /assistant;
}

# REST API (chat, reports, analyze)
location /api/ {
    proxy_pass http://127.0.0.1:8001/api/;
    include /etc/nginx/snippets/nrms-ai-proxy.conf;
}

# Optional: Swagger docs (restrict in production if needed)
location /docs {
    proxy_pass http://127.0.0.1:8001/docs;
    include /etc/nginx/snippets/nrms-ai-proxy.conf;
}

location /openapi.json {
    proxy_pass http://127.0.0.1:8001/openapi.json;
    include /etc/nginx/snippets/nrms-ai-proxy.conf;
}

location /health {
    proxy_pass http://127.0.0.1:8001/health;
    include /etc/nginx/snippets/nrms-ai-proxy.conf;
}
