# Example full vhost for nrms.ati.gov.et (merge with your existing GeoServer/site config)
# Copy snippets or merge locations — do NOT replace GeoServer blocks blindly.

server {
    listen 80;
    listen [::]:80;
    server_name nrms.ati.gov.et;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nrms.ati.gov.et;

    # Your existing SSL paths
    ssl_certificate     /etc/nginx/cert/ssl_fullchain.crt;
    ssl_certificate_key /etc/nginx/cert/ssl.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── Your existing NRMS website / GeoServer locations go here ──
    # location /geoserver { ... }
    # location / { root /var/www/nrms; try_files $uri $uri/ /index.html; }

    # ── NRMS AI Assistant (Docker API on 127.0.0.1:8001) ─────────────
    include /etc/nginx/snippets/nrms-ai-locations.conf;
}
