# NRMS AI Assistant — Docker Compose
#
# Usage:
#   cp .env.example .env   # set GEMINI_API_KEY
#   docker compose up -d --build
#
# API listens on 127.0.0.1:8001 — point host nginx at this port (see nginx/).

services:
  postgres:
    image: postgres:16-alpine
    container_name: nrms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nrms
      POSTGRES_PASSWORD: nrms
      POSTGRES_DB: nrms
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nrms -d nrms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: nrms-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nrms-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nrms-ai-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NRMS_DATA_DIR: /data/rangeland
      DATABASE_URL: postgresql://nrms:nrms@postgres:5432/nrms
      REDIS_URL: redis://redis:6379/0
      GEOSERVER_URL: https://nrms.ati.gov.et/geoserver
    volumes:
      - ${NRMS_TIFS_HOST_PATH:-/home/kaleabwalelign/Documents/rangeland_data}:/data/rangeland:ro
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  pgdata:
