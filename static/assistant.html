<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NRMS AI Assistant</title>

  <style>
    :root {
      --brown:     #685C48;
      --brown-dk:  #574d3d;
      --brown-lt:  #f5f0ea;
      --surface:   #faf7f4;
      --white:     #ffffff;
      --border:    #e0d6cc;
      --border-md: #cec4b8;
      --text:      #2c2520;
      --muted:     #a89a8c;
      --placeholder: #b5a99e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: var(--brown-lt);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 1rem 1.25rem;
      background: var(--brown);
      border-bottom: 1px solid rgba(0,0,0,0.12);
    }
    header h1 {
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.01em;
    }
    header p {
      margin-top: 0.2rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.6);
    }
    header a {
      color: #f0e8dd;
      text-decoration: none;
    }
    header a:hover { text-decoration: underline; }

    /* ── Message list ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: var(--surface);
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .msg-row.user-row  { justify-content: flex-end; }
    .msg-row.bot-row   { justify-content: flex-start; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--brown);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .msg {
      max-width: 78%;
      padding: 0.7rem 1rem;
      font-size: 0.93rem;
      line-height: 1.55;
      word-wrap: break-word;
    }
    .msg.user {
      background: var(--brown);
      color: #fff;
      border-radius: 14px 14px 4px 14px;
      white-space: pre-wrap;
    }
    .msg.bot {
      background: var(--white);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
    }
    .msg.error {
      border-color: #e2a0a0;
      color: #8b2020;
    }

    /* ── Bot markdown styles ── */
    .msg.bot h1,
    .msg.bot h2,
    .msg.bot h3 {
      margin: 0.6rem 0 0.3rem;
      font-weight: 500;
      color: var(--brown);
    }
    .msg.bot p  { margin: 0.35rem 0; }
    .msg.bot ul { padding-left: 1.2rem; }
    .msg.bot li { margin-bottom: 0.25rem; }
    .msg.bot strong { color: var(--brown-dk); }
    .msg.bot code {
      background: var(--brown-lt);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88rem;
    }
    .msg.bot pre {
      background: var(--brown-lt);
      padding: 0.85rem;
      border-radius: 8px;
      overflow-x: auto;
    }

    /* ── Footer / input ── */
    footer {
      padding: 0.85rem 1rem 1rem;
      background: var(--white);
      border-top: 1px solid var(--border);
    }
    form { display: flex; gap: 0.5rem; }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1.5px solid var(--border-md);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.93rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus   { border-color: var(--brown); }
    input[type="text"]::placeholder { color: var(--placeholder); }

    button[type="submit"] {
      padding: 0.6rem 1.15rem;
      border: none;
      border-radius: 10px;
      background: var(--brown);
      color: #fff;
      font-size: 0.93rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button[type="submit"]:hover    { background: var(--brown-dk); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }
  </style>
</head>

<body>
  <header>
    <h1>NRMS AI Assistant</h1>
    <p>National Rangeland Monitoring System·
      <a href="/">← Back to NRMS</a>
    </p>
  </header>

  <div id="messages" aria-live="polite"></div>

  <footer>
    <form id="chat-form">
      <input id="input" type="text"
        placeholder="e.g. What is the rangeland condition in Afambo?"
        autocomplete="off" />
      <button type="submit" id="send-btn">Send</button>
    </form>
    <p class="status" id="status"></p>
  </footer>

  <!-- Markdown Library -->
  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>

  <script>
    const API_BASE  = window.NRMS_API_URL || window.location.origin;
    let sessionId   = localStorage.getItem("nrms_session_id") || null;

    const messagesEl = document.getElementById("messages");
    const form       = document.getElementById("chat-form");
    const input      = document.getElementById("input");
    const sendBtn    = document.getElementById("send-btn");
    const statusEl   = document.getElementById("status");

    const md = window.markdownit({ breaks: true, linkify: true });

    function addMessage(text, role, isError) {
      const row = document.createElement("div");
      row.className = "msg-row " + (role === "user" ? "user-row" : "bot-row");

      if (role === "bot") {
        const av = document.createElement("div");
        av.className = "avatar";
        av.setAttribute("aria-hidden", "true");
        av.textContent = "AI";
        row.appendChild(av);
      }

      const el = document.createElement("div");
      el.className = "msg " + role + (isError ? " error" : "");

      if (role === "bot") {
        el.innerHTML = md.render(text);
      } else {
        el.textContent = text;
      }

      row.appendChild(el);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      sendBtn.disabled = true;
      statusEl.textContent = "Analyzing NRMS data…";

      try {
        const res = await fetch(API_BASE + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);

        sessionId = data.session_id;
        localStorage.setItem("nrms_session_id", sessionId);

        addMessage(data.reply || data.error || "No response", "bot", !!data.error);
        statusEl.textContent = "Session: " + sessionId.slice(0, 8) + "…";
      } catch (err) {
        addMessage("Error: " + err.message, "bot", true);
        statusEl.textContent = "";
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    });

    addMessage(
      "Hello! Ask about Rangeland health, Vegetation, Soil, Water, Climate, or Livestock in Ethiopian Rangeland areas.",
      "bot"
    );
  </script>
</body>
</html>
